name: Windows Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  # ── 1. Path filter ──────────────────────────────────────────────────────────
  check-if-windows-should-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.watched_paths.outputs.src }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - id: watched_paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            src:
              - 'composeApp/src/**'
              - 'composeApp/build.gradle.kts'
              - 'gradle/libs.versions.toml'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - '.github/workflows/test-windows.yml'

  # ── 2. Unit tests — pure JVM, no display needed ────────────────────────────
  unit-tests-windows:
    name: Windows Unit Tests (JVM)
    needs: check-if-windows-should-run
    if: ${{ github.event_name != 'pull_request' || needs.check-if-windows-should-run.outputs.should_run == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: '.sdkmanrc'
          distribution: liberica

      - uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b # v4.3.0
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Create local.properties with dummy credentials
        shell: pwsh
        run: |
          "discogs.consumerKey=ci_dummy_key" | Out-File -FilePath local.properties -Encoding utf8
          "discogs.consumerSecret=ci_dummy_secret" | Add-Content -Path local.properties -Encoding utf8

      - name: Run JVM unit tests
        run: ./gradlew :composeApp:jvmTest --no-daemon

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-unit-test-results
          path: composeApp/build/reports/tests/jvmTest/

  # ── 3. Desktop UI tests — Compose Desktop window on Windows ───────────────
  # Windows runners have a real display (no xvfb needed) so Compose Desktop
  # windows can be opened directly.
  ui-tests-windows-desktop:
    name: Windows Desktop UI Tests
    needs: check-if-windows-should-run
    if: ${{ github.event_name != 'pull_request' || needs.check-if-windows-should-run.outputs.should_run == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: '.sdkmanrc'
          distribution: liberica

      - uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b # v4.3.0
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Create local.properties with dummy credentials
        shell: pwsh
        run: |
          "discogs.consumerKey=ci_dummy_key" | Out-File -FilePath local.properties -Encoding utf8
          "discogs.consumerSecret=ci_dummy_secret" | Add-Content -Path local.properties -Encoding utf8

      - name: Run Desktop UI tests
        run: ./gradlew :composeApp:desktopTest --no-daemon

      - name: Upload Desktop UI test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-desktop-ui-test-results
          path: composeApp/build/reports/tests/desktopTest/
