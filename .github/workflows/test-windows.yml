name: Windows Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  # ── 1. Path filter ──────────────────────────────────────────────────────────
  check-if-windows-should-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.watched_paths.outputs.src }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - id: watched_paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            src:
              - 'composeApp/src/**'
              - 'composeApp/build.gradle.kts'
              - 'gradle/libs.versions.toml'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - '.github/workflows/test-windows.yml'
