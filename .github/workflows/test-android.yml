name: Android Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

# ─── Shared setup step extracted as a reusable anchor ────────────────────────
# Every job that builds/tests needs Java + Gradle + credentials.
# We can't use YAML anchors in GitHub Actions, so we repeat the three steps
# and keep them identical across jobs.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Path filter — skip everything if no relevant files changed ──────────
  check-if-android-should-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.watched_paths.outputs.src }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: watched_paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            src:
              - 'composeApp/src/**'
              - 'composeApp/build.gradle.kts'
              - 'gradle/libs.versions.toml'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - '.github/workflows/test-android.yml'

  # ── 2. Unit tests — fast, JVM-only, no emulator needed ────────────────────
  unit-tests-android:
    name: Android Unit Tests
    needs: check-if-android-should-run
    if: ${{ github.event_name != 'pull_request' || needs.check-if-android-should-run.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: '.sdkmanrc'
          distribution: liberica

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Create local.properties with dummy credentials
        run: |
          echo "discogs.consumerKey=ci_dummy_key" >> local.properties
          echo "discogs.consumerSecret=ci_dummy_secret" >> local.properties

      # Runs commonTest + androidUnitTest (pure JVM, no device required)
      - name: Run unit tests
        run: ./gradlew :composeApp:testDebugUnitTest --no-daemon

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-unit-test-results
          path: composeApp/build/reports/tests/testDebugUnitTest/

  # ── 3. Instrumented tests — slow, needs Android emulator ──────────────────
  instrumented-tests-android:
    name: Android Instrumented Tests (Emulator)
    needs: check-if-android-should-run
    if: ${{ github.event_name != 'pull_request' || needs.check-if-android-should-run.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version-file: '.sdkmanrc'
          distribution: liberica

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Create local.properties with dummy credentials
        run: |
          echo "discogs.consumerKey=ci_dummy_key" >> local.properties
          echo "discogs.consumerSecret=ci_dummy_secret" >> local.properties

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests on Android emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: ./gradlew :composeApp:connectedDebugAndroidTest --no-daemon

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-instrumented-test-results
          path: composeApp/build/reports/androidTests/connected/
