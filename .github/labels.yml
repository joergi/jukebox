# GitHub repository labels — applied via actions/github-script or gh CLI
# Mirrors the label set used in joergi/jukebox (Flutter)
labels:
  - name: "dependencies"
    color: "0075ca"
    description: "Pull requests that update a dependency file"

  - name: "automatic-merge"
    color: "e4e669"
    description: "Dependabot PRs eligible for automatic merge"

  - name: "kotlin"
    color: "7F52FF"
    description: "Gradle / Kotlin dependency updates"

  - name: "github-actions"
    color: "000000"
    description: "GitHub Actions workflow dependency updates"

  - name: "minor"
    color: "84b6eb"
    description: "Semver minor version bump"

  - name: "patch"
    color: "c5def5"
    description: "Semver patch version bump"

  - name: "major"
    color: "d93f0b"
    description: "Semver major version bump — needs manual review"

  - name: "bug"
    color: "d73a4a"
    description: "Something isn't working"

  - name: "enhancement"
    color: "a2eeef"
    description: "New feature or request"

  - name: "documentation"
    color: "0075ca"
    description: "Improvements or additions to documentation"

  - name: "good first issue"
    color: "7057ff"
    description: "Good for newcomers"
